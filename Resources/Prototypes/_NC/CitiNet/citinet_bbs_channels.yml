    - NCPD_Patrol
    - NCPD_Command
    - NC_General
  isHidden: false

- type: citiNetChannel
  id: MaxTac_HQ
  name: citinet-bbs-channel-maxtac
  color: "#182c4d"
  access:
    - MaxTac_General
  isHidden: false

# Trauma Team — общий канал для всех сотрудников
- type: citiNetChannel
  id: TraumaTeam_General
  name: citinet-bbs-channel-trauma-general
