# NC — CitiNet BBS каналы
# Гражданские текстовые каналы, маршрутизируемые через CitiNet Relay

- type: citiNetChannel
  id: CitiNetPublic
  name: citinet-bbs-channel-public
  color: "#cccccc"
  isAnonymous: true

- type: citiNetChannel
  id: Afterlife
  name: citinet-bbs-channel-afterlife
  color: "#9933ff"
  isHidden: true

- type: citiNetChannel
  id: NCPD_HQ
  name: citinet-bbs-channel-ncpd
  color: "#2f5c9e"
