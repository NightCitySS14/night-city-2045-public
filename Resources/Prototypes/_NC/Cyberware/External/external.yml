# --- KEVLAR SUBLAYER TIER 1 ---
- type: entity
  id: CyberwareExternalKevlarSublayer
  parent: BaseCyberwareImplant
  name: "Moore Tech 'Carapace'"
  description: "The cheapest street protection. Layers of ballistic kevlar are implanted under the skin to absorb small caliber impacts."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 14
    cyberFamily: ArmorLayer
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.9
        Shock: 1.2

# --- THERMOPLASTIC ARMOR TIER 2 ---
- type: entity
  id: CyberwareExternalThermoplasticArmor
  parent: BaseCyberwareImplant
  name: "Arasaka 'Skinweave'"
  description: "High-tech thermal protection. Polymer plates react to heat, hardening instantly upon impact."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 22
    cyberFamily: ArmorLayer
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.85
        Heat: 0.95
        Shock: 1.3

# --- REACTIVE SUBLAYER TIER 3 ---
- type: entity
  id: CyberwareExternalReactiveSublayer
  parent: BaseCyberwareImplant
  name: "Militech 'Subdermal'"
  description: "Military-grade subdermal armor. Not quite human, but feels like a concrete wall."
  components:
  - type: CyberwareImplant
    category: External
    humanityCost: 35
    cyberFamily: ArmorLayer
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.75
        Slash: 0.8
        Blunt: 0.85
        Shock: 1.5
