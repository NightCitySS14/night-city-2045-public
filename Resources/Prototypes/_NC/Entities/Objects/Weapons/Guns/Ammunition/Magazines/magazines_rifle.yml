- type: entity
  id: MagazineRifleNomad
  name: магазин пневматического гвоздемета (штыри)
  description: Самодельный магазин для пневматического гвоздемета Кочевников. Вмещает 12 тяжелых штырей.
  parent: BaseMagazineRifle
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 12
    proto: CartridgeNomadSpike
    whitelist:
      tags:
      - CartridgeNomadSpike
  - type: Sprite
    layers:
    - state: red
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Tag
    tags:
    - MagazineRifle

