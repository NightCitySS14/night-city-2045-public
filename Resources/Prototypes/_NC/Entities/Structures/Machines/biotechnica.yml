# region Abstract

- type: entity
  id: VendingMachineBiotechnica
  abstract: true
  components:
  - type: PointLight
    radius: 2
    energy: 1.6
    color: "#6facac"  # Biotechnica palette
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

# region Botany

- type: entity
  parent: [VendingMachineBiotechnica, VendingMachineNutri]
  id: VendingMachineBiotechnicaBotany
  name: Интрументы Biotechnica
  description: Корпоративный автомат, содержащий средства и инструменты для работы с растениями.
  suffix: Гидропоника, Ботаника
  components:
  - type: VendingMachine
    pack: BiotechnicaBotanyInventory
  - type: Sprite
    sprite: _NC/Structures/Machines/Biotechnica/botany.rsi
  - type: AccessReader
    access: [ [ "Biotech_Botany" ] ]

- type: entity
  parent: [VendingMachineBiotechnica, VendingMachineHydrobe]
