    pack: BiotechnicaBotanyDrobeInventory
  - type: Sprite
    sprite: _NC/Structures/Machines/Biotechnica/botany_drobe.rsi
  - type: AccessReader
    access: [ [ "Biotech_Botany" ] ]

- type: entity
  parent: [VendingMachineBiotechnica, VendingMachineSeeds]
