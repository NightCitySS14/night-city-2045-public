# ----------------------------
# Trauma Team Cyberware Machine
# ----------------------------

- type: entity
  id: TrademachineTraumaCyberware
  parent: Trademachine
  name: автомат с имплантами Trauma Team
  description: Высокотехнологичный торговый автомат для авторизованной продажи кибернетических имплантов сотрудникам Trauma Team.
  components:
  - type: NcStore
    buyPresets:
    - TradeTrauma_Cyberware_Buy
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/medical.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: AccessReader
    access: [["Trauma_Medical"]]
