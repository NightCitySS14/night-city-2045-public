- type: htnCompound
  id: NCBanditRootCompound
  branches:
    # Priority 1: Maintenance (Jam clearing / Racking).
    # We MUST do this if the gun is jammed or not racked, 
    # otherwise CombatCompound might fail and lead to dropping the weapon.
    - tasks:
        - !type:HTNCompoundTask
          task: RackGunCompound
      preconditions:
        - !type:NCWeaponMaintenancePrecondition

    # Priority 2: Tactical Combat.
    - tasks:
        - !type:HTNCompoundTask
          task: SimpleHumanoidHostileCompound

    # Priority 3: Idle (Fallback).
    # If no combat target and no maintenance, just idle around.
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: htnCompound
  id: RackGunCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:NPCUseInHandOperator

- type: htnCompound
  id: NCBanditTier2CombatCompound
  branches:
    - preconditions:
        - !type:GunAmmoPrecondition
          minPercent: 0.001
      tasks:
        - !type:HTNCompoundTask
          task: RangedCombatCompound
    - preconditions:
        - !type:GunAmmoPrecondition
          maxPercent: 0.001
      tasks:
        - !type:HTNCompoundTask
          task: PickupAmmoCompound
    - tasks:
        - !type:HTNCompoundTask
          task: RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound

- type: htnCompound
  id: NCBanditTier2RootCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: RackGunCompound
      preconditions:
        - !type:NCWeaponMaintenancePrecondition
    - tasks:
        - !type:HTNCompoundTask
          task: NCBanditTier2CombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: htnCompound
  id: NCBanditMilitechCombatCompound
  branches:
    - preconditions:
        - !type:ActiveHandComponentPrecondition
          components:
            - type: Gun
      tasks:
        - !type:HTNCompoundTask
          task: GunCombatCompound
    - preconditions:
        - !type:GunAmmoPrecondition
          maxPercent: 0.001
      tasks:
        - !type:HTNCompoundTask
          task: PickupAmmoCompound
    - tasks:
        - !type:HTNCompoundTask
          task: RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound

- type: htnCompound
  id: NCBanditTier3RootCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: RackGunCompound
      preconditions:
        - !type:NCWeaponMaintenancePrecondition
    - tasks:
        - !type:HTNCompoundTask
          task: NCBanditMilitechCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound
